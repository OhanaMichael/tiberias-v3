<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בלוג מלונות טבריה - מדריכים וטיפים לנופש בכנרת</title>
  <meta name="description" content="מדריכי טיולים, המלצות למלונות, אטרקציות וטיפים לנופש מושלם בטבריה ובכנרת">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #0B1F3A;
      --navy-mid:#143258;
      --amber: #C8832A;
      --amber-lt:#E8A84A;
      --sand: #F6F0E8;
      --paper: #FAFAF8;
      --ink: #111827;
      --ink-mid: #374151;
      --ink-lt: #6B7280;
      --rule: rgba(11,31,58,.1);
      --sh-sm: 0 2px 10px rgba(11,31,58,.08);
      --r: 14px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);direction:rtl;line-height:1.8;}
    
    .header{background:var(--navy);color:#fff;padding:60px 20px;text-align:center;}
    .header h1{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,52px);font-weight:900;margin-bottom:12px;}
    .header p{font-size:18px;opacity:.9;}
    
    .container{max-width:1200px;margin:60px auto;padding:0 20px;}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:32px;}
    
    .post-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm);transition:all .3s;text-decoration:none;display:block;}
    .post-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(11,31,58,.15);}
    
    .post-category{display:inline-block;background:var(--amber);color:var(--navy);font-size:11px;font-weight:900;padding:6px 14px;border-radius:20px;margin:20px 0 0 20px;}
    
    .post-content{padding:24px;}
    .post-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--navy);margin-bottom:12px;line-height:1.3;}
    .post-desc{font-size:15px;color:var(--ink-mid);line-height:1.7;margin-bottom:16px;}
    .post-meta{font-size:13px;color:var(--ink-lt);display:flex;gap:16px;flex-wrap:wrap;}
    
    .loading{text-align:center;padding:60px 20px;color:var(--ink-mid);}
    .error{text-align:center;padding:60px 20px;color:#DC2626;}
    
    footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:30px 20px;font-size:13px;margin-top:80px;}
    footer a{color:var(--amber);text-decoration:none;}
  </style>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J5KX0PHLGY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J5KX0PHLGY');
  </script>
</head>
<body>

<header class="header">
  <h1>בלוג מלונות טבריה</h1>
  <p>מדריכים, טיפים והמלצות לנופש מושלם בכנרת</p>
</header>

<div class="container">
  <div id="posts-container" class="loading">טוען מאמרים...</div>
</div>

<footer>
  <div style="max-width:900px;margin:0 auto;text-align:center">
    <div style="margin-bottom:16px;font-size:14px">
      <a href="/" style="color:var(--amber);text-decoration:none;margin:0 12px">🏠 דף הבית</a>
      <span style="color:rgba(255,255,255,.3)">·</span>
      <a href="/blog/" style="color:var(--amber);text-decoration:none;margin:0 12px">📝 בלוג וטיפים</a>
    </div>
    פורטל מלונות טבריה &nbsp;·&nbsp; כל הזכויות שמורות
    <div style="margin-top:8px;font-size:11px;color:rgba(255,255,255,0.6);line-height:1.5">
      אתר זה משתתף בתוכנית Affiliate של Booking.com ומקבל עמלה על הזמנות שבוצעו דרך הקישורים באתר
    </div>
  </div>
</footer>

<script>
// Load and display blog posts
async function loadPosts() {
  const container = document.getElementById('posts-container');
  
  try {
    const response = await fetch('/blog/posts.json');
    if (!response.ok) throw new Error('Failed to load posts');
    
    const data = await response.json();
    const posts = data.posts || [];
    
    if (posts.length === 0) {
      container.innerHTML = '<div class="error">אין מאמרים להצגה</div>';
      return;
    }
    
    // Sort by date (newest first)
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    // Generate HTML
    const postsHTML = posts.map(post => {
      const date = new Date(post.date);
      const dateStr = date.toLocaleDateString('he-IL', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
      
      return `
        <a href="/blog/${post.slug}/" class="post-card">
          <div class="post-category">${post.category || 'כללי'}</div>
          <div class="post-content">
            <h2 class="post-title">${post.title}</h2>
            <p class="post-desc">${post.description}</p>
            <div class="post-meta">
              <span>📅 ${dateStr}</span>
              <span>✍️ ${post.author || 'צוות מלונות טבריה'}</span>
            </div>
          </div>
        </a>
      `;
    }).join('');
    
    container.innerHTML = `<div class="posts-grid">${postsHTML}</div>`;
    
  } catch (error) {
    console.error('Error loading posts:', error);
    container.innerHTML = '<div class="error">שגיאה בטעינת המאמרים. נסה לרענן את הדף.</div>';
  }
}

// Load posts when page loads
loadPosts();

// Netlify Identity
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/";
      });
    }
  });
}
</script>

</body>
</html>
