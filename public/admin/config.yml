backend:
  name: git-gateway
  branch: main

media_folder: "public/images/blog"
public_folder: "/images/blog"

locale: 'he'

collections:
  - name: "blog"
    label: "מאמרים בבלוג"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "כותרת", name: "title", widget: "string", required: true}
      - {label: "תאור קצר", name: "description", widget: "text", required: true}
      - {label: "תמונה ראשית", name: "featured_image", widget: "image", required: true}
      - {label: "תאריך פרסום", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss", required: true}
      - {label: "קטגוריה", name: "category", widget: "select", options: ["אטרקציות", "מלונות", "מסעדות", "מדריכים", "אירועים"], required: true}
      - {label: "תגיות", name: "tags", widget: "list", required: false}
      - {label: "תוכן המאמר", name: "body", widget: "markdown", required: true}
      - {label: "פורסם", name: "published", widget: "boolean", default: false}
      - {label: "מילות מפתח SEO", name: "seo_keywords", widget: "string", required: false}
      - {label: "כתב", name: "author", widget: "string", default: "צוות מלונות טבריה", required: false}
